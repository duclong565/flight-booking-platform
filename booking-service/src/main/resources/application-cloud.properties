# Active on the cloud host via SPRING_PROFILES_ACTIVE=cloud (see render.yaml).
# Overrides the local defaults in application.properties.

# Listen on the port the platform assigns (Render injects PORT); fall back to 8080 locally.
server.port=${PORT:8080}

# Datasource built from the managed Postgres connection details, injected as env vars
# from the database (render.yaml wires PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD).
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# No Kafka broker on the free tier — disable event publishing, listeners, and topic creation.
# The REST API (auth, flights, bookings) works fully; Kafka is exercised by tests + local docker.
app.events.enabled=false
spring.kafka.admin.auto-create=false
