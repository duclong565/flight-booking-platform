spring.application.name=booking-service

# Local dev datasource — uses the shared local `postgres` container
# (one database per project; the `flightbooking` DB was created there).
spring.datasource.url=jdbc:postgresql://localhost:5432/flightbooking
spring.datasource.username=duclong565
spring.datasource.password=duclong565

# Hibernate auto-creates/updates tables from @Entity classes (learning setup).
# Flyway is intentionally disabled for this slice (it's a later lesson).
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Print the SQL Hibernate generates — useful while learning JPA.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Expose health/info for a quick liveness check.
management.endpoints.web.exposure.include=health,info
