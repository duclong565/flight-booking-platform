spring.application.name=booking-service

# Local dev datasource — uses the shared local `postgres` container
# (one database per project; the `flightbooking` DB was created there).
spring.datasource.url=jdbc:postgresql://localhost:5432/flightbooking
spring.datasource.username=duclong565
spring.datasource.password=duclong565

# Hibernate auto-creates/updates tables from @Entity classes (learning setup).
# Flyway is intentionally disabled for this slice (it's a later lesson).
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Print the SQL Hibernate generates — useful while learning JPA.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Expose health/info for a quick liveness check.
management.endpoints.web.exposure.include=health,info

# --- Kafka (event streaming) ------------------------------------------------
# The broker address. Matches the Kafka container in docker-compose.yml.
spring.kafka.bootstrap-servers=localhost:9092

# PRODUCER: send a String key + the event object serialized as JSON.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CONSUMER: read the String key + deserialize the JSON back into a Java object.
# group-id = this app's consumer group; auto-offset-reset=earliest so we still
# see messages produced before the consumer first connected.
spring.kafka.consumer.group-id=booking-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Only trust JSON that maps to classes in our own event package (a safety guard).
spring.kafka.consumer.properties.spring.json.trusted.packages=com.deanflights.flight.event
# If a message arrives without a type header, assume it is this type.
spring.kafka.consumer.properties.spring.json.value.default.type=com.deanflights.flight.event.FlightCreatedEvent
